<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUKU YETU - Premium Poultry Products</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <!-- Add to both index.html and admin.html in the head section -->
<link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32x32.png">
<link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
</head>
<body>
    <!-- Loading Spinner -->
    <div id="loading-spinner" class="loading-spinner">
        <div class="spinner"></div>
    </div>

    <!-- Header -->
    <header class="header">
        <div class="header-top">
            <div class="container">
                <div class="header-left">
                    <button class="menu-toggle" id="menuToggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div class="logo">
                        <h1>KUKU YETU</h1>
                    </div>
                </div>
                <div class="header-right">
                    <button class="notification-btn" id="notificationBtn">
                        <i class="fas fa-bell"></i>
                        <span class="badge" id="notificationBadge">0</span>
                    </button>
                    <a href="#" class="whatsapp-btn" id="whatsappBtn">
                        <i class="fab fa-whatsapp"></i>
                    </a>
                    <a href="#" class="support-btn" id="supportBtn">
                        <i class="fas fa-headset"></i>
                    </a>
                </div>
            </div>
        </div>

        <!-- Navigation Menu (Hidden by default) -->
        <nav class="main-nav" id="mainNav">
            <div class="container">
                <ul class="nav-links">
                    <li><a href="#" data-filter="all">All Products</a></li>
                    <li><a href="#" data-filter="broilers">Broilers</a></li>
                    <li><a href="#" data-filter="layers">Layers</a></li>
                    <li><a href="#" data-filter="eggs">Eggs</a></li>
                    <li><a href="#" data-filter="chicks">Chicks</a></li>
                </ul>
            </div>
        </nav>

        <!-- Search Bar -->
        <div class="search-bar">
            <div class="container">
                <div class="search-container">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="searchInput" placeholder="Search products by name, category, or ID...">
                </div>
            </div>
        </div>
    </header>

    <!-- Notification Panel -->
    <div class="notification-panel" id="notificationPanel">
        <div class="notification-header">
            <h3>Notifications</h3>
            <button class="close-btn" id="closeNotifications"><i class="fas fa-times"></i></button>
        </div>
        <div class="notification-list" id="notificationList">
            <!-- Notifications will be loaded here -->
        </div>
    </div>

    <!-- Side Menu -->
    <div class="side-menu" id="sideMenu">
        <div class="side-menu-header">
            <h3>Menu</h3>
            <button class="close-btn" id="closeMenu"><i class="fas fa-times"></i></button>
        </div>
        <div class="side-menu-content">
            <div class="menu-section">
                <h4>Filters</h4>
                <div class="filter-options">
                    <label><input type="checkbox" value="broilers"> Broilers</label>
                    <label><input type="checkbox" value="layers"> Layers</label>
                    <label><input type="checkbox" value="eggs"> Eggs</label>
                    <label><input type="checkbox" value="chicks"> Chicks</label>
                </div>
            </div>
            <div class="menu-section">
                <h4>Quick Links</h4>
                <ul>
                    <li><a href="#" data-page="home">Home</a></li>
                    <li><a href="#" data-page="categories">Categories</a></li>
                    <li><a href="#" data-page="cart">Cart</a></li>
                    <li><a href="#" data-page="favorites">Favorites</a></li>
                    <li><a href="#" data-page="about">About</a></li>
                    <li><a href="#" data-page="profile">Profile</a></li>
                </ul>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Products Grid -->
            <div class="products-grid" id="productsGrid">
                <!-- Products will be loaded here -->
            </div>
        </div>
    </main>

    <!-- Footer Navigation -->
    <footer class="footer-nav">
        <div class="container">
            <div class="footer-icons">
                <button class="footer-btn" data-page="home">
                    <i class="fas fa-home"></i>
                    <span>Home</span>
                </button>
                <button class="footer-btn" data-page="categories">
                    <i class="fas fa-th-large"></i>
                    <span>Categories</span>
                </button>
                <button class="footer-btn" data-page="cart" id="cartBtn">
                    <i class="fas fa-shopping-cart"></i>
                    <span>Cart</span>
                    <span class="badge" id="cartBadge">0</span>
                </button>
                <button class="footer-btn" data-page="favorites">
                    <i class="fas fa-heart"></i>
                    <span>Favorites</span>
                </button>
                <button class="footer-btn" data-page="about">
                    <i class="fas fa-info-circle"></i>
                    <span>About</span>
                </button>
                <button class="footer-btn" data-page="profile">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                </button>
            </div>
        </div>
    </footer>

    <!-- Product Modal -->
    <div class="modal" id="productModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Product Details</h2>
                <button class="close-modal"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" id="productModalBody">
                <!-- Product details will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Cart Modal -->
    <div class="modal" id="cartModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Shopping Cart</h2>
                <button class="close-modal"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" id="cartModalBody">
                <!-- Cart will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Login / Register</h2>
                <button class="close-modal"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="auth-tabs">
                    <button class="tab-btn active" data-tab="login">Login</button>
                    <button class="tab-btn" data-tab="register">Register</button>
                </div>
                
                <!-- Login Form -->
                <form id="loginForm" class="auth-form active">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" required>
                    </div>
                    <button type="submit" class="btn-primary">Login</button>
                </form>

                <!-- Register Form -->
                <form id="registerForm" class="auth-form">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="registerName" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="registerEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="registerPhone" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="registerPassword" required minlength="6">
                    </div>
                    <button type="submit" class="btn-primary">Register</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
